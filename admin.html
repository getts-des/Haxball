<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - HaxBall Mundial 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Rajdhani',sans-serif;background:#0A0012;color:#E0E0E0;min-height:100vh}

    /* HEADER */
    .adm-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 20px;
      background:rgba(10,0,18,0.95);
      border-bottom:1px solid rgba(161,0,255,0.2);
      position:sticky;top:0;z-index:50;
      backdrop-filter:blur(8px);
    }
    .adm-header-left{display:flex;align-items:center;gap:12px}
    .back-link{font-size:12px;color:#444;text-decoration:none;letter-spacing:0.1em;
      padding:4px 10px;border:1px solid #222;border-radius:6px;transition:all 0.2s}
    .back-link:hover{color:#A100FF;border-color:rgba(161,0,255,0.4)}
    .adm-badge{font-size:12px;font-weight:700;letter-spacing:0.2em;color:#A100FF}
    .user-email{font-size:11px;color:#444}
    .btn-logout{font-size:12px;padding:6px 14px;border-radius:8px;cursor:pointer;
      background:rgba(255,80,80,0.1);color:#F87171;border:1px solid rgba(255,80,80,0.2);
      font-family:inherit;font-weight:600;letter-spacing:0.1em;transition:all 0.2s}
    .btn-logout:hover{background:rgba(255,80,80,0.2)}
    .btn-reset{font-size:12px;padding:6px 14px;border-radius:8px;cursor:pointer;
      background:rgba(255,140,0,0.1);color:#FFA040;border:1px solid rgba(255,140,0,0.25);
      font-family:inherit;font-weight:600;letter-spacing:0.1em;transition:all 0.2s}
    .btn-reset:hover{background:rgba(255,140,0,0.2)}

    /* LOGIN */
    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-box{background:#10001F;border:1px solid rgba(161,0,255,0.25);border-radius:16px;
      padding:40px 32px;width:100%;max-width:360px;text-align:center}
    .login-title{font-size:22px;font-weight:700;letter-spacing:0.15em;color:#fff;margin-bottom:6px}
    .login-sub{font-size:12px;color:#555;letter-spacing:0.15em;margin-bottom:28px}
    .form-group{margin-bottom:16px;text-align:left}
    .form-label{display:block;font-size:11px;letter-spacing:0.15em;color:#666;margin-bottom:6px}
    .form-input{width:100%;padding:10px 14px;background:#0A0012;border:1px solid rgba(161,0,255,0.2);
      border-radius:8px;color:#E0E0E0;font-family:inherit;font-size:14px;outline:none;transition:border 0.2s}
    .form-input:focus{border-color:#A100FF}
    .btn-primary{width:100%;padding:12px;border-radius:8px;cursor:pointer;
      background:linear-gradient(135deg,#7000CC,#A100FF);color:#fff;border:none;
      font-family:inherit;font-size:14px;font-weight:700;letter-spacing:0.15em;
      transition:opacity 0.2s;margin-top:8px}
    .btn-primary:hover{opacity:0.85}
    .btn-primary:disabled{opacity:0.4;cursor:not-allowed}
    .error-msg{color:#F87171;font-size:12px;margin-top:10px;min-height:16px}

    /* ADMIN PANEL */
    .panel{max-width:960px;margin:0 auto;padding:28px 16px}
    .panel-title{font-size:16px;font-weight:700;letter-spacing:0.2em;color:#C040FF;margin-bottom:20px}
    .panel-sub{font-size:12px;color:#555;margin-bottom:20px;letter-spacing:0.1em}

    /* SETUP */
    .groups-setup{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
    .setup-group{background:#10001F;border:1px solid rgba(161,0,255,0.2);border-radius:12px;padding:16px}
    .setup-group-title{font-size:13px;font-weight:700;letter-spacing:0.2em;color:#A100FF;margin-bottom:12px}
    .team-input{width:100%;padding:8px 12px;background:#0A0012;border:1px solid rgba(161,0,255,0.15);
      border-radius:7px;color:#E0E0E0;font-family:inherit;font-size:13px;outline:none;
      margin-bottom:8px;transition:border 0.2s}
    .team-input:focus{border-color:#A100FF}
    .team-input:last-child{margin-bottom:0}

    .btn-start{padding:14px 32px;border-radius:10px;cursor:pointer;
      background:linear-gradient(135deg,#7000CC,#A100FF);color:#fff;border:none;
      font-family:inherit;font-size:15px;font-weight:700;letter-spacing:0.15em;
      display:block;margin:0 auto;transition:opacity 0.2s}
    .btn-start:hover{opacity:0.85}
    .btn-start:disabled{opacity:0.4;cursor:not-allowed}

    .team-count-selector{display:flex;gap:16px;justify-content:center;margin:40px 0;flex-wrap:wrap}
    .btn-count{padding:20px 32px;border-radius:12px;cursor:pointer;
      background:#10001F;color:#E0E0E0;border:2px solid rgba(161,0,255,0.3);
      font-family:inherit;font-size:18px;font-weight:700;letter-spacing:0.15em;
      transition:all 0.2s;min-width:140px}
    .btn-count:hover{border-color:#A100FF;background:rgba(161,0,255,0.1);color:#fff}
    .count-desc{font-size:11px;display:block;color:#666;margin-top:4px;letter-spacing:0.1em;font-weight:400}

    /* MATCH ENTRY */
    .phase-section{margin-bottom:32px}
    .phase-header{font-size:14px;font-weight:700;letter-spacing:0.2em;color:#A100FF;
      margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(161,0,255,0.15)}
    .counter{font-size:12px;color:#555;font-weight:400;margin-left:10px}
    .match-entry{display:flex;align-items:center;gap:8px;padding:10px 12px;
      background:#10001F;border:1px solid rgba(161,0,255,0.12);border-radius:9px;
      margin-bottom:8px;flex-wrap:wrap}
    .match-entry.done{border-color:rgba(255,215,0,0.15);background:#0f001a}
    .m-team{flex:1;font-weight:600;font-size:13px;min-width:80px;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .m-team.right{text-align:right}
    .score-input{width:52px;padding:6px 8px;background:#0A0012;border:1px solid rgba(161,0,255,0.2);
      border-radius:6px;color:#E0E0E0;font-family:inherit;font-size:15px;font-weight:700;
      text-align:center;outline:none;transition:border 0.2s}
    .score-input:focus{border-color:#A100FF}
    .score-sep{color:#555;font-size:13px;font-weight:700}
    .btn-save{padding:7px 16px;border-radius:7px;cursor:pointer;
      background:rgba(161,0,255,0.15);color:#C040FF;border:1px solid rgba(161,0,255,0.3);
      font-family:inherit;font-size:12px;font-weight:700;letter-spacing:0.1em;
      white-space:nowrap;transition:all 0.2s}
    .btn-save:hover{background:rgba(161,0,255,0.25)}
    .btn-edit{padding:7px 14px;border-radius:7px;cursor:pointer;
      background:rgba(255,255,255,0.04);color:#555;border:1px solid #222;
      font-family:inherit;font-size:12px;letter-spacing:0.1em;transition:all 0.2s}
    .btn-edit:hover{color:#E0E0E0;border-color:#444}
    .result-display{padding:4px 12px;background:rgba(161,0,255,0.1);border-radius:6px;
      font-weight:700;font-size:14px;color:#E0E0E0;white-space:nowrap}
    .winner-tag{font-size:11px;color:#FFD700;font-weight:700;white-space:nowrap}

    .btn-advance{padding:14px 28px;border-radius:10px;cursor:pointer;
      background:linear-gradient(135deg,#005500,#00AA00);color:#fff;border:none;
      font-family:inherit;font-size:14px;font-weight:700;letter-spacing:0.15em;
      display:block;margin:20px auto 0;transition:opacity 0.2s}
    .btn-advance:hover{opacity:0.85}
    .btn-advance:disabled{opacity:0.4;cursor:not-allowed}

    .btn-finish{padding:14px 28px;border-radius:10px;cursor:pointer;
      background:linear-gradient(135deg,#AA7700,#FFD700);color:#000;border:none;
      font-family:inherit;font-size:14px;font-weight:700;letter-spacing:0.15em;
      display:block;margin:20px auto 0;transition:opacity 0.2s}
    .btn-finish:hover{opacity:0.85}

    .pending-phase{text-align:center;padding:20px;color:#333;
      font-size:13px;letter-spacing:0.1em;border:1px dashed #222;border-radius:10px}

    .alert{padding:10px 16px;border-radius:8px;margin-bottom:16px;font-size:13px;font-weight:600}
    .alert.err{background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.3);color:#F87171}
    .alert.ok{background:rgba(0,200,0,0.08);border:1px solid rgba(0,200,0,0.2);color:#4CAF50}

    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:14px}
    .spinner{width:38px;height:38px;border-radius:50%;border:3px solid rgba(161,0,255,0.15);
      border-top-color:#A100FF;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .hidden{display:none!important}

    @media(max-width:600px){
      .groups-setup{grid-template-columns:1fr 1fr}
      .match-entry{gap:5px}
      .m-team{font-size:11px}
    }
    @media(max-width:400px){
      .groups-setup{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading" class="loading">
  <div class="spinner"></div>
</div>

<!-- LOGIN -->
<div id="login-section" class="login-wrap hidden">
  <div class="login-box">
    <div class="login-title">🔐 ADMIN</div>
    <div class="login-sub">HAXBALL MUNDIAL 2026</div>
    <div class="form-group">
      <label class="form-label">EMAIL</label>
      <input class="form-input" type="email" id="email-input" placeholder="admin@ejemplo.com">
    </div>
    <div class="form-group">
      <label class="form-label">CONTRASEÑA</label>
      <input class="form-input" type="password" id="pass-input" placeholder="••••••••">
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">INGRESAR</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- ADMIN APP -->
<div id="admin-app" class="hidden">
  <div class="adm-header">
    <div class="adm-header-left">
      <a href="index.html" class="back-link">← Ver torneo</a>
      <span class="adm-badge">🔐 ADMIN</span>
    </div>
    <div class="adm-header-left">
      <span class="user-email" id="user-email"></span>
      <button class="btn-reset" onclick="resetTournament()">↺ Reset torneo</button>
      <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </div>
  <div class="panel" id="panel"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyD3UbRDFPdw1pF00wUALt-Bedk8aFgnYfc",
    authDomain: "haxball-2026.firebaseapp.com",
    projectId: "haxball-2026",
    storageBucket: "haxball-2026.firebasestorage.app",
    messagingSenderId: "35167072757",
    appId: "1:35167072757:web:d52f59c4a27a03c3c9b0bc"
  });
  const db = firebase.firestore();
  const auth = firebase.auth();

  let state = { config: null, teams: [], matches: [] };
  let unsubs = [];
  let selectedTeamCount = 0;

  // ─── AUTH ───────────────────────────────────────────────
  auth.onAuthStateChanged(user => {
    document.getElementById('loading').classList.add('hidden');
    if (user) {
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('admin-app').classList.remove('hidden');
      document.getElementById('user-email').textContent = user.email;
      startListeners();
    } else {
      document.getElementById('login-section').classList.remove('hidden');
      document.getElementById('admin-app').classList.add('hidden');
      stopListeners();
    }
  });

  function doLogin() {
    const email = document.getElementById('email-input').value.trim();
    const pass = document.getElementById('pass-input').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    err.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Ingresando...';
    auth.signInWithEmailAndPassword(email, pass)
      .catch(e => { err.textContent = 'Credenciales incorrectas.'; })
      .finally(() => { btn.disabled = false; btn.textContent = 'INGRESAR'; });
  }

  document.getElementById('pass-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function doLogout() { auth.signOut(); }

  // ─── FIRESTORE LISTENERS ─────────────────────────────────
  function startListeners() {
    stopListeners();
    unsubs.push(db.doc('tournament/config').onSnapshot(async s => {
      if (!s.exists) {
        await db.doc('tournament/config').set({ status: 'setup', name: 'HAXBALL MUNDIAL 2026' });
        return;
      }
      state.config = s.data();
      renderPanel();
    }));
    unsubs.push(db.collection('teams').onSnapshot(s => {
      state.teams = s.docs.map(d => ({ id: d.id, ...d.data() }));
      renderPanel();
    }));
    unsubs.push(db.collection('matches').onSnapshot(s => {
      state.matches = s.docs.map(d => ({ id: d.id, ...d.data() }));
      renderPanel();
    }));
  }

  function stopListeners() { unsubs.forEach(u => u()); unsubs = []; }

  // ─── STANDINGS CALCULATION ───────────────────────────────
  function calcStandings(group) {
    const ts = state.teams.filter(t => t.group === group);
    const ms = state.matches.filter(m => m.phase === 'group' && m.group === group && m.status === 'completed');
    const map = {};
    ts.forEach(t => { map[t.id] = { id:t.id, name:t.name, pj:0, g:0, p:0, gf:0, gc:0, gd:0, pts:0 }; });
    ms.forEach(m => {
      const a = map[m.team1Id], b = map[m.team2Id];
      if (!a || !b) return;
      a.pj++; b.pj++; a.gf += m.score1; a.gc += m.score2;
      b.gf += m.score2; b.gc += m.score1;
      if (m.score1 > m.score2) { a.g++; a.pts += 3; b.p++; }
      else { b.g++; b.pts += 3; a.p++; }
    });
    Object.values(map).forEach(s => s.gd = s.gf - s.gc);
    return Object.values(map).sort((a, b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      if (b.gd !== a.gd) return b.gd - a.gd;
      if (b.gf !== a.gf) return b.gf - a.gf;
      for (const m of ms) {
        if (m.team1Id === a.id && m.team2Id === b.id) return m.score1 > m.score2 ? -1 : 1;
        if (m.team1Id === b.id && m.team2Id === a.id) return m.score2 > m.score1 ? -1 : 1;
      }
      return 0;
    });
  }

  // ─── RENDER PANEL ────────────────────────────────────────
  function renderPanel() {
    if (!state.config) return;
    const status = state.config.status;
    const panel = document.getElementById('panel');

    if (status === 'setup') panel.innerHTML = renderSetup();
    else if (status === 'groups') panel.innerHTML = renderGroupsPhase();
    else if (status === 'knockouts' || status === 'finished') panel.innerHTML = renderKnockoutsPhase();
  }

  // ─── SETUP PHASE ─────────────────────────────────────────
  function renderSetup() {
    if (!selectedTeamCount) {
      return `<div class="panel-title">⚙ CONFIGURACIÓN DEL TORNEO</div>
        <div class="panel-sub">Ingresá la cantidad de equipos (múltiplo de 4, mínimo 8)</div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:16px;margin:40px 0">
          <input type="number" id="team-count-input" class="score-input"
            style="width:130px;font-size:28px;padding:14px;text-align:center"
            placeholder="16" min="8" step="4">
          <button class="btn-start" style="margin:0" onclick="confirmTeamCount()">CONTINUAR →</button>
        </div>
        <div id="setup-alert"></div>`;
    }

    const numGroups = selectedTeamCount / 4;
    const groupLabels = Array.from({length: numGroups}, (_, i) => String.fromCharCode(65 + i));
    const cols = groupLabels.map(g => `
      <div class="setup-group">
        <div class="setup-group-title">GRUPO ${g}</div>
        <input class="team-input" placeholder="Equipo 1" id="g${g}t1">
        <input class="team-input" placeholder="Equipo 2" id="g${g}t2">
        <input class="team-input" placeholder="Equipo 3" id="g${g}t3">
        <input class="team-input" placeholder="Equipo 4" id="g${g}t4">
      </div>`).join('');

    return `<div class="panel-title">⚙ CONFIGURACIÓN DEL TORNEO</div>
      <div class="panel-sub">${selectedTeamCount} equipos · ${numGroups} grupos de 4</div>
      <div style="margin-bottom:16px">
        <button class="btn-edit" onclick="selectedTeamCount=0;renderPanel()">← Cambiar cantidad</button>
      </div>
      <div class="groups-setup">${cols}</div>
      <div id="setup-alert"></div>
      <button class="btn-start" onclick="initTournament()">INICIAR TORNEO</button>`;
  }

  function confirmTeamCount() {
    const val = parseInt(document.getElementById('team-count-input').value);
    if (!val || val < 8 || val % 4 !== 0) {
      document.getElementById('setup-alert').innerHTML = '<div class="alert err">Ingresá un número múltiplo de 4, mínimo 8.</div>';
      return;
    }
    selectedTeamCount = val;
    renderPanel();
  }

  async function initTournament() {
    const numGroups = selectedTeamCount / 4;
    const groupLabels = Array.from({length: numGroups}, (_, i) => String.fromCharCode(65 + i));
    const allTeams = [];
    for (const g of groupLabels) {
      for (let i = 1; i <= 4; i++) {
        const val = document.getElementById(`g${g}t${i}`).value.trim();
        if (!val) {
          document.getElementById('setup-alert').innerHTML = `<div class="alert err">Completá los ${selectedTeamCount} equipos antes de iniciar.</div>`;
          return;
        }
        allTeams.push({ name: val, group: g });
      }
    }

    const btn = document.querySelector('.btn-start');
    btn.disabled = true; btn.textContent = 'Iniciando...';

    try {
      const batch = db.batch();
      const teamRefs = {};
      groupLabels.forEach(g => teamRefs[g] = []);

      for (const t of allTeams) {
        const ref = db.collection('teams').doc();
        batch.set(ref, { name: t.name, group: t.group });
        teamRefs[t.group].push({ id: ref.id, name: t.name });
      }

      const pairs = [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]];
      let order = 0;
      for (const g of groupLabels) {
        const gt = teamRefs[g];
        for (const [i, j] of pairs) {
          const ref = db.collection('matches').doc();
          batch.set(ref, {
            phase: 'group', group: g, order: order++,
            team1Id: gt[i].id, team2Id: gt[j].id,
            team1Name: gt[i].name, team2Name: gt[j].name,
            score1: null, score2: null, winnerId: null, winnerName: null,
            status: 'pending'
          });
        }
      }

      batch.update(db.doc('tournament/config'), { status: 'groups', teamCount: selectedTeamCount, numGroups });
      await batch.commit();
    } catch (e) {
      document.getElementById('setup-alert').innerHTML = `<div class="alert err">Error: ${e.message}</div>`;
      btn.disabled = false; btn.textContent = 'INICIAR TORNEO';
    }
  }

  // ─── GROUPS PHASE ────────────────────────────────────────
  function renderGroupsPhase() {
    const gMatches = state.matches.filter(m => m.phase === 'group');
    const done = gMatches.filter(m => m.status === 'completed').length;
    const total = gMatches.length;
    const numGroups = state.config.numGroups || 4;
    const expectedTotal = numGroups * 6;
    const allDone = done === total && total === expectedTotal;

    const sections = ['A','B','C','D'].map(g => {
      const ms = gMatches.filter(m => m.group === g).sort((a,b) => a.order - b.order);
      const rows = ms.map(m => matchEntryRow(m)).join('');
      return `<div class="phase-section">
        <div class="phase-header">GRUPO ${g}</div>
        ${rows}
      </div>`;
    }).join('');

    const advBtn = allDone
      ? `<button class="btn-advance" onclick="advanceToKnockouts()">⚡ AVANZAR A CUARTOS DE FINAL</button>`
      : `<button class="btn-advance" disabled>⚡ AVANZAR A CUARTOS (${done}/${total} partidos)</button>`;

    return `<div class="panel-title">⚽ FASE DE GRUPOS <span class="counter">${done}/${total} completados</span></div>
      <div id="groups-alert"></div>
      ${sections}
      ${advBtn}`;
  }

  function matchEntryRow(m) {
    const isDone = m.status === 'completed';
    const t1w = isDone && m.winnerId === m.team1Id;
    const t2w = isDone && m.winnerId === m.team2Id;

    if (isDone) {
      return `<div class="match-entry done" id="match-${m.id}">
        <div class="m-team ${t1w?'':''}">
          ${t1w ? '<span class="winner-tag">▶ </span>' : ''}${esc(m.team1Name)}
        </div>
        <div class="result-display">${m.score1} - ${m.score2}</div>
        <div class="m-team right">
          ${esc(m.team2Name)}${t2w ? ' <span class="winner-tag">◀</span>' : ''}
        </div>
        <button class="btn-edit" onclick="editMatch('${m.id}')">Editar</button>
      </div>`;
    }

    return `<div class="match-entry" id="match-${m.id}">
      <div class="m-team">${esc(m.team1Name)}</div>
      <input class="score-input" type="number" min="0" max="99" id="s1-${m.id}" placeholder="0">
      <span class="score-sep">-</span>
      <input class="score-input" type="number" min="0" max="99" id="s2-${m.id}" placeholder="0">
      <div class="m-team right">${esc(m.team2Name)}</div>
      <button class="btn-save" onclick="saveMatch('${m.id}','${m.team1Id}','${m.team2Id}','${esc(m.team1Name)}','${esc(m.team2Name)}')">Guardar</button>
    </div>`;
  }

  function editMatch(matchId) {
    const m = state.matches.find(x => x.id === matchId);
    if (!m) return;
    const el = document.getElementById(`match-${matchId}`);
    if (!el) return;
    el.outerHTML = `<div class="match-entry" id="match-${m.id}">
      <div class="m-team">${esc(m.team1Name)}</div>
      <input class="score-input" type="number" min="0" max="99" id="s1-${m.id}" value="${m.score1}">
      <span class="score-sep">-</span>
      <input class="score-input" type="number" min="0" max="99" id="s2-${m.id}" value="${m.score2}">
      <div class="m-team right">${esc(m.team2Name)}</div>
      <button class="btn-save" onclick="saveMatch('${m.id}','${m.team1Id}','${m.team2Id}','${esc(m.team1Name)}','${esc(m.team2Name)}')">Guardar</button>
    </div>`;
  }

  async function saveMatch(matchId, t1Id, t2Id, t1Name, t2Name) {
    const s1 = parseInt(document.getElementById(`s1-${matchId}`)?.value);
    const s2 = parseInt(document.getElementById(`s2-${matchId}`)?.value);
    if (isNaN(s1) || isNaN(s2) || s1 < 0 || s2 < 0) { alert('Ingresá puntajes válidos.'); return; }
    if (s1 === s2) { alert('No puede haber empate. Ingresá resultados distintos.'); return; }
    const winnerId = s1 > s2 ? t1Id : t2Id;
    const winnerName = s1 > s2 ? t1Name : t2Name;
    await db.doc(`matches/${matchId}`).update({ score1: s1, score2: s2, winnerId, winnerName, status: 'completed' });
  }

  function nextPow2(n) { let p=1; while(p<n) p*=2; return p; }

  function koRoundLabel(matchCount) {
    if (matchCount >= 8) return `RONDA DE ${matchCount * 2}`;
    if (matchCount === 4) return 'CUARTOS DE FINAL';
    if (matchCount === 2) return 'SEMIFINALES';
    return 'FINAL';
  }

  function buildBracket(seeds, cup, batch) {
    const Q = seeds.length;
    const B = nextPow2(Q);
    const padded = [...seeds];
    while (padded.length < B) padded.push(null);
    const totalRounds = Math.log2(B);
    for (let i = 0; i < B/2; i++) {
      const t1 = padded[i], t2 = padded[B-1-i];
      const isBye = !t1 || !t2;
      const winner = isBye ? (t1 || t2) : null;
      const ref = db.collection('matches').doc();
      batch.set(ref, {
        phase: `${cup}_0`, cup, group: null, order: i,
        team1Id: t1?.id||null, team2Id: t2?.id||null,
        team1Name: t1?.name||null, team2Name: t2?.name||null,
        score1: isBye?0:null, score2: isBye?0:null,
        winnerId: winner?.id||null, winnerName: winner?.name||null,
        status: isBye?'completed':'pending', isBye
      });
    }
    return totalRounds;
  }

  async function advanceToKnockouts() {
    const btn = document.querySelector('.btn-advance');
    btn.disabled = true; btn.textContent = 'Calculando...';
    try {
      const groups = [...new Set(state.teams.map(t => t.group))].sort();
      const p1=[],p2=[],p3=[],p4=[];
      for (const g of groups) {
        const st = calcStandings(g);
        if (st[0]) p1.push({ id:st[0].id, name:st[0].name });
        if (st[1]) p2.push({ id:st[1].id, name:st[1].name });
        if (st[2]) p3.push({ id:st[2].id, name:st[2].name });
        if (st[3]) p4.push({ id:st[3].id, name:st[3].name });
      }
      const goldSeeds = [...p1, ...p2];
      const silverSeeds = [...p3, ...p4];

      const batch = db.batch();
      const goldRounds = buildBracket(goldSeeds, 'gold', batch);
      const silverRounds = buildBracket(silverSeeds, 'silver', batch);
      batch.update(db.doc('tournament/config'), {
        status: 'knockouts',
        koTotalRounds: goldRounds
      });
      await batch.commit();
    } catch(e) {
      alert('Error al avanzar: ' + e.message);
      btn.disabled = false; btn.textContent = '⚡ AVANZAR A ELIMINATORIAS';
    }
  }

  // ─── KNOCKOUTS PHASE ─────────────────────────────────────
  function renderCupSection(cup, label, emoji) {
    const totalRounds = state.config.koTotalRounds || 3;
    let html = `<div style="margin-bottom:32px">
      <div class="panel-title">${emoji} ${label}</div>`;

    for (let r = 0; r < totalRounds; r++) {
      const rMatches = state.matches.filter(m => m.phase === `${cup}_${r}`).sort((a,b) => a.order - b.order);
      const visible = rMatches.filter(m => !m.isBye);
      const allDone = rMatches.length > 0 && rMatches.every(m => m.status === 'completed');
      const nextExists = state.matches.some(m => m.phase === `${cup}_${r+1}`);
      const isLast = r === totalRounds - 1;

      html += `<div class="phase-section"><div class="phase-header">${koRoundLabel(rMatches.length || Math.pow(2, totalRounds-1-r))}</div>`;
      if (visible.length > 0) {
        html += visible.map(m => matchEntryRow(m)).join('');
      } else if (r > 0) {
        const prevDone = state.matches.filter(m => m.phase === `${cup}_${r-1}`).every(m => m.status === 'completed');
        html += `<div class="pending-phase">${prevDone ? 'Listo para crear.' : 'Esperando la ronda anterior.'}</div>`;
      }
      html += `</div>`;

      if (allDone && !nextExists && !isLast) {
        html += `<button class="btn-advance" style="margin-bottom:12px" onclick="createNextRound('${cup}',${r})">⚡ CREAR ${koRoundLabel(rMatches.length/2)}</button>`;
      }
    }
    html += `</div>`;
    return html;
  }

  function renderKnockoutsPhase() {
    const totalRounds = state.config.koTotalRounds;
    if (!totalRounds) return `<div class="panel-title">🏆 ELIMINATORIAS</div>`;

    const goldFinal = state.matches.filter(m => m.phase === `gold_${totalRounds-1}`);
    const silverFinal = state.matches.filter(m => m.phase === `silver_${totalRounds-1}`);
    const bothDone = goldFinal.every(m => m.status==='completed') && silverFinal.every(m => m.status==='completed')
      && goldFinal.length > 0 && silverFinal.length > 0;

    let html = renderCupSection('gold', 'COPA DE ORO', '🥇');
    html += `<div style="height:1px;background:linear-gradient(90deg,transparent,rgba(161,0,255,0.3),transparent);margin:16px 0 32px"></div>`;
    html += renderCupSection('silver', 'COPA DE PLATA', '🥈');

    if (bothDone && state.config.status !== 'finished') {
      html += `<button class="btn-finish" onclick="finishTournament()">🏆 FINALIZAR TORNEO</button>`;
    }
    return html;
  }

  async function createNextRound(cup, fromRound) {
    const prev = state.matches.filter(m => m.phase === `${cup}_${fromRound}`).sort((a,b) => a.order - b.order);
    const batch = db.batch();
    for (let i = 0; i < prev.length; i += 2) {
      const m1 = prev[i], m2 = prev[i+1];
      const ref = db.collection('matches').doc();
      batch.set(ref, {
        phase: `${cup}_${fromRound+1}`, cup, group: null, order: i/2,
        team1Id: m1.winnerId, team2Id: m2.winnerId,
        team1Name: m1.winnerName, team2Name: m2.winnerName,
        score1: null, score2: null, winnerId: null, winnerName: null,
        status: 'pending', isBye: false
      });
    }
    await batch.commit();
  }

  async function finishTournament() {
    await db.doc('tournament/config').update({ status: 'finished' });
  }

  // ─── UTILS ───────────────────────────────────────────────
  async function resetTournament() {
    const ok = confirm('¿Seguro que querés resetear el torneo? Se borran todos los equipos y partidos. Esta acción no se puede deshacer.');
    if (!ok) return;
    const ok2 = confirm('¿Confirmás el reset completo del torneo?');
    if (!ok2) return;

    try {
      const batch = db.batch();

      const teams = await db.collection('teams').get();
      teams.forEach(d => batch.delete(d.ref));

      const matches = await db.collection('matches').get();
      matches.forEach(d => batch.delete(d.ref));

      batch.set(db.doc('tournament/config'), { status: 'setup', name: 'HAXBALL MUNDIAL 2026' });

      await batch.commit();
    } catch(e) {
      alert('Error al resetear: ' + e.message);
    }
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
